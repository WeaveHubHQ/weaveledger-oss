name = "weaveledger-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Uncomment and set your custom domain after deployment:
# routes = [
#   { pattern = "ledger.yourdomain.com", custom_domain = true }
# ]

# D1 Database — create with: npx wrangler d1 create weaveledger-db
[[d1_databases]]
binding = "DB"
database_name = "weaveledger-db"
database_id = "" # Set after running: npx wrangler d1 create weaveledger-db
migrations_dir = "migrations"

# R2 Bucket — create with: npx wrangler r2 bucket create weaveledger-receipts
[[r2_buckets]]
binding = "RECEIPTS_BUCKET"
bucket_name = "weaveledger-receipts"

# Workflows
[[workflows]]
name = "receipt-processor"
binding = "RECEIPT_WORKFLOW"
class_name = "ReceiptProcessorWorkflow"

# Inbound email routing (optional)
# Configure in Cloudflare Dashboard > your domain > Email > Email Routing
# to route receipts@yourdomain.com > this Worker
# [[email_routing]]
# enabled = true

# Outbound email (optional)
# [[send_email]]
# name = "SEND_EMAIL"

# Subscription enforcement — the iOS app requires a Pro subscription for full features.
# The licensing worker validates subscriptions centrally.
[vars]
SUBSCRIPTION_ENFORCEMENT = "none"
# LICENSING_URL = "https://licensing.weavehub.app"  # Only needed when SUBSCRIPTION_ENFORCEMENT = "licensing"
# APPLE_BUNDLE_ID = "com.yourcompany.yourapp"  # Optional: restrict Apple IAP verification to a specific bundle ID
# ALLOWED_ORIGIN = "https://your-frontend.example.com"  # Optional: override default CORS origin for a custom web frontend
# APP_URL = "https://your-frontend.example.com"         # Optional: base URL used in password reset emails (same as ALLOWED_ORIGIN if using a custom web frontend)

# Environment variables (set via wrangler secret put)
# Required:
#   npx wrangler secret put JWT_SECRET
#
# For AI receipt scanning (at least one required):
#   npx wrangler secret put CLAUDE_API_KEY
#   npx wrangler secret put OPENAI_API_KEY
#
# For Google Play webhooks (optional):
#   npx wrangler secret put GOOGLE_PLAY_WEBHOOK_SECRET

# Cron trigger: sync all active integrations daily at 6 AM UTC
[triggers]
crons = ["0 6 * * *"]

# Upload size limit for receipt images (10 MB)
[limits]
cpu_ms = 30000
